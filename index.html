<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EagleEye Protocol</title>

<script src="https://sdk.minepi.com/pi-sdk.js"></script>

<style>
body {
    font-family: Arial;
    background: #020617;
    color: #e2e8f0;
    text-align: center;
    padding: 20px;
}

.container {
    max-width: 520px;
    margin: auto;
}

.title {
    font-size: 22px;
    margin-bottom: 10px;
}

.subtitle {
    font-size: 12px;
    color: #64748b;
}

.card {
    background: #0f172a;
    padding: 20px;
    margin: 15px 0;
    border-radius: 12px;
}

button {
    padding: 12px;
    margin: 5px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    color: white;
}

.buy { background: #16a34a; }
.sell { background: #dc2626; }
.wait { background: #eab308; color:black; }

.status {
    margin-top: 10px;
    font-size: 14px;
}
</style>
</head>

<body>

<div class="container">

<div class="title">🦅 EagleEye Protocol</div>
<div class="subtitle">AI + Web3 Market Intelligence Engine</div>

<div class="card">
    <div id="user">جارٍ الاتصال...</div>
</div>

<div class="card">
    <h3>📊 Market Intelligence</h3>
    <div id="market">تحميل...</div>
</div>

<div class="card">
    <h3>⚡ Decision Engine</h3>
    <button class="buy" onclick="vote('buy')">BUY</button>
    <button class="sell" onclick="vote('sell')">SELL</button>
    <button class="wait" onclick="vote('wait')">WAIT</button>

    <div id="vote-status" class="status"></div>
</div>

<div class="card">
    <h3>💹 Live Data Feed</h3>
    <div id="price">...</div>
</div>

<div class="card">
    <h3>🧠 AI Layer (Placeholder)</h3>
    <div>سيتم تفعيل التحليل الذكي لاحقاً</div>
</div>

</div>

<script>
const API = "https://eagleeye-api.adrar520.workers.dev";

let userName = null;

// انتظار تحميل Pi SDK
function waitForPi(){
    if(window.Pi){
        initPi();
    } else {
        setTimeout(waitForPi, 100);
    }
}

// التهيئة الصحيحة (بدون sandbox)
async function initPi(){
    try {
        await window.Pi.init({ version: "2.0" });

        const auth = await window.Pi.authenticate(['username'], function(){});

        userName = auth.user.username;

        document.getElementById("user").innerText =
            "👤 " + userName;

    } catch(e){
        console.log(e);
        document.getElementById("user").innerText =
            "❌ فشل الاتصال بـ Pi";
    }

    loadMarket();
    loadPrice();
}

// إرسال التصويت
async function vote(action){

    if(!userName){
        document.getElementById("vote-status").innerText =
            "يجب تسجيل الدخول عبر Pi";
        return;
    }

    document.getElementById("vote-status").innerText =
        "جارٍ إرسال القرار...";

    try {
        await fetch(API + "/vote", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                user: userName,
                action: action
            })
        });

        document.getElementById("vote-status").innerText =
            "✔ تم تسجيل: " + action;

        loadMarket();

    } catch(e){
        document.getElementById("vote-status").innerText =
            "❌ خطأ في الإرسال";
    }
}

// جلب السوق
async function loadMarket(){
    try {
        const res = await fetch(API + "/market");
        const data = await res.json();

        document.getElementById("market").innerText =
            "BUY " + data.buy + "% | SELL " + data.sell + "% | WAIT " + data.wait + "%";

    } catch {
        document.getElementById("market").innerText =
            "فشل تحميل السوق";
    }
}

// سعر BTC
async function loadPrice(){
    try {
        const res = await fetch(
            "https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd"
        );

        const data = await res.json();

        document.getElementById("price").innerText =
            "BTC: $" + data.bitcoin.usd;

    } catch {
        document.getElementById("price").innerText =
            "فشل تحميل البيانات";
    }
}

// تحديث مستمر
setInterval(loadMarket, 3000);

waitForPi();
</script>

</body>
</html>
