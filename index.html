<script>
  async function checkPi() {
    const sdkEl = document.getElementById("sdk");
    const appEl = document.getElementById("appid");

    // تحقق من وجود Pi
    if (!window.Pi) {
      sdkEl.innerHTML = "Pi SDK: غير موجود (خارج Pi Browser)";
      sdkEl.className = "status fail";
      appEl.innerHTML = "APP_ID: NOT_FOUND";
      appEl.className = "status fail";
      return;
    }

    sdkEl.innerHTML = "Pi SDK: موجود";
    sdkEl.className = "status ok";

    try {
      // تهيئة Pi بشكل صحيح (async)
      await Pi.init({ version: "2.0" });

      // محاولة الحصول على بيانات المستخدم (هذا هو الاختبار الحقيقي)
      const scopes = ['username'];

      const auth = await Pi.authenticate(scopes, function(payment) {
        console.log("payment callback", payment);
      });

      if (auth && auth.user && auth.user.username) {
        appEl.innerHTML = "APP CONNECTED: " + auth.user.username;
        appEl.className = "status ok";
      } else {
        appEl.innerHTML = "APP_ID: NOT_FOUND";
        appEl.className = "status fail";
      }

    } catch (e) {
      console.log(e);
      appEl.innerHTML = "فشل الاتصال بـ Pi";
      appEl.className = "status fail";
    }
  }

  setTimeout(checkPi, 1000);
</script>
